server {
    listen 80;

    server_name _;

    location / {
        proxy_pass http://ambrosia_dashboard:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files with correct MIME types
    location /static/ {
        alias /app/staticfiles/;
        # Revalidate on every load (cheap 304s via ETag/Last-Modified) instead
        # of a 30-day hard cache. Without this, updated JS/CSS is not picked up
        # for 30 days, which makes deployed fixes look "not fixed" in the browser.
        add_header Cache-Control "no-cache";
        access_log off;
        autoindex on;
    }
}
