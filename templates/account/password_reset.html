{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Reset password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'css/account_custom_css.css' %}" />
</head>
<body>
<div class="page">
    <div class="card">
        <h1 class="card-title">Reset password</h1>
        <p class="card-text">
            Enter your account email address. We will send you a link to reset your password.
        </p>

        {% if form.non_field_errors %}
            <div class="errorlist">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <form method="post" action="{% url 'account_reset_password' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}
                {{ form.email.errors }}
            </div>

            <button type="submit">Send reset link</button>
        </form>

        <div class="secondary-links">
            <a href="/accounts/login/">Back to sign in</a>
        </div>
    </div>
</div>

<script>
    (function () {
        const form = document.querySelector("form");
        if (!form) return;
        form.addEventListener("submit", function (e) {
            const btn = form.querySelector("button[type='submit']");
            if (!btn) return;
            if (btn.dataset.submitted === "1") {
                e.preventDefault();
                return;
            }
            btn.dataset.submitted = "1";
        });
    })();
</script>
</body>
</html>
