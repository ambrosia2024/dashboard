services:
  mongo:
    image: mongo:8.2.5
    container_name: ambrosia-mongo
    restart: unless-stopped

    ports:
      - "127.0.0.1:27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminmongo:
    image: mrvautin/adminmongo:latest
    container_name: ambrosia-adminmongo
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy

    # Admin UI in browser: http://localhost:1234
    ports:
      - "127.0.0.1:1234:1234"

    environment:
      # mongodb://<root_user>:<root_pass>@mongo:27017/<db>?authSource=admin
      HOST: 0.0.0.0
      PORT: 1234

  # Optional helper "tool" container.
  mongosh:
    image: mongo:8.2.5
    profiles: ["tools"]
    entrypoint: ["bash", "-lc", "sleep infinity"]
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
